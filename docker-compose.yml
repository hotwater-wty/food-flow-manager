services:
  mysql:
    image: mysql:8
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - "/usr/local/app/mysql/data:/var/lib/mysql"
      - "./assets/schema.sql:/docker-entrypoint-initdb.d/schema.sql"
    networks:
      - food-flow-manager-net
  food-flow-manager:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: food-flow-manager-server
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/food_flow_manager?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
    networks:
      - food-flow-manager-net
    depends_on:
      - mysql

networks:
  food-flow-manager-net:
    name: food-flow-manager
